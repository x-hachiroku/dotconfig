[options]
Architecture = auto

HoldPkg = pacman glibc
IgnorePkg = apifox burpsuite cursor-bin google-chrome nchat rar
IgnoreGroup =
NoUpgrade =
NoExtract =
CleanMethod = KeepInstalled

Color
CheckSpace
# VerbosePkgLists

SigLevel = Required DatabaseOptional

ParallelDownloads = 4
# XferCommand = /usr/bin/aria2c --conf-path=/etc/pacman.d/aria2.conf %u


[core]
Include = /etc/pacman.d/mirrorlist


[extra]
Include = /etc/pacman.d/mirrorlist


# [multilib]
# Include = /etc/pacman.d/mirrorlist


[arch4edu]
Server = https://mirror.iscas.ac.cn/arch4edu/$arch
# Server = https://repository.arch4edu.org/$arch


[archlinuxcn]
Server = https://repo.archlinuxcn.org/$arch
# Server = https://mirror.iscas.ac.cn/archlinuxcn/$arch
# Server = https://mirrors.xtom.hk/archlinuxcn/$arch
